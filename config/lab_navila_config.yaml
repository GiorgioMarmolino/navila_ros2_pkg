# ============================================================================
# lab_navila_config.yaml
#
# Configuration tuned for the real robot in the Vicon lab.
#
# Assumptions:
# - real robot (use_sim_time = false)
# - confined indoor space (central hall, three desks, taped zone), people nearby
# - Velodyne VLP-16 PointCloud2 on /velodyne_points
# - ZED camera via camera_utils_ros
#
# VERIFY before first real run (open hardware points):
#   - image_topic       : exact ZED compressed topic name
#   - odom_topic        : that filtered odometry is actually published on hardware
#   - cloud_topic + TF  : static TF base_link → velodyne must exist
#   - is_frame_rgb      : confirm channel order on the debug frames
#   - depth_topic       : only if enabling depth
# ============================================================================

action_node:
  ros__parameters:
    use_sim_time: false

    # Topics
    action_topic:        "/navila/action"
    odom_topic:          "/platform/odom"
    status_topic:        "/navila/primitive_status"
    path_blocked_topic:  "/safety/path_blocked"
    # cmd_vel_topic is set dynamically by the launch file (depends on enable_safety)

    step_linear_cm: 0.1 # m
    step_angular_deg: 10  # deg
    
    # Per-token velocities — reduced for a confined lab with people
    linear_x:       0.15   # m/s    — forward
    linear_x_fast:  0.15   # m/s    — forward_fast
    linear_x_back:  0.15   # m/s    — backward
    angular_z:      0.1   # rad/s  — in-place rotation
    curve_linear:   0.15   # m/s    — linear component of curve_*
    curve_angular:  0.35   # rad/s  — angular component of curve_*

    # Watchdog / smoothing
    cmd_timeout_sec:   1.0   # s
    watchdog_rate_sec: 0.05  # s  (20 Hz)
    publish_rate_sec:  0.05  # s  (20 Hz)
    max_acc_linear:    0.4   # m/s²  — gentler on real hardware
    max_acc_angular:   0.8   # rad/s²


safety_layer_node:
  ros__parameters:
    use_sim_time: false

    # Topics
    cmd_in_topic:       "/cmd_vel_raw"
    cmd_out_topic:      "/cmd_vel"
    cloud_topic:        "/velodyne_points"           # requires static TF base_link→velodyne
    depth_topic:        "/zed/depth/depth_registered"
    path_blocked_topic: "/safety/path_blocked"
    occupancy_topic:    "/safety/occupancy"
    enable_depth:       false                         # enable only after depth_topic verified
    publish_grid:       true

    # TF
    base_frame: "base_link"

    # Height band (ground removal)
    ground_clip_z:   0.12   # m  — slightly higher: real floor noise
    max_obstacle_z:  1.50   # m

    # Occupancy grid
    grid_res:   0.05   # m
    grid_range: 3.0    # m  — smaller local grid for a confined lab

    # Robot footprint (Husky ~0.99 x 0.67 m) — physical, unchanged
    robot_half_length: 0.50   # m
    robot_half_width:  0.34   # m
    footprint_margin:  0.15   # m  — a bit more margin around people

    # Predictive sweep
    predict_horizon_sec: 1.5    # s  — shorter horizon at lower speeds
    predict_turn_deg:    90.0   # deg
    predict_dt:          0.10   # s
    block_debounce:      3      # consecutive cycles before latching path_blocked

    # Safety distances — tightened for the confined lab
    front_stop_dist: 1.0   # m  — hard stop
    front_slow_dist: 1.3   # m  — start slowing down
    side_stop_dist:  0.8   # m
    rear_stop_dist:  1.0   # m

    # Sector FOVs
    front_fov_deg: 60.0    # deg
    side_fov_deg:  15.0    # deg
    rear_fov_deg:  10.0    # deg

    # Timeouts / smoothing
    cloud_timeout_sec: 0.5    # s  — real VLP-16 ~10 Hz, tighter staleness check
    cmd_timeout_sec:   3.0    # s
    depth_timeout_sec: 1.4    # s
    publish_rate_sec:  0.05   # s  (20 Hz)
    max_acc_linear:    0.8    # m/s²
    max_acc_angular:   1.5    # rad/s²
    turn_reduction:    0.4    # near-side turn reduction factor


navila_node:
  ros__parameters:
    use_sim_time: false

    # Model paths
    model_path: "/models"

    # Topics
    image_topic:    "/realsense/color/image_raw/compressed"
    goal_topic:     "/goal_instruction"
    action_topic:   "/navila/action"
    reset_topic:    "/navila/reset"
    status_topic:   "/navila/primitive_status"
    complete_topic: "/benchmark/command"

    # Debug
    debug_dir: "/home/ros_ws/tmp/navila_debug"

    # Inference
    num_video_frames:       8      # 7 historical + 1 current (NaVILA paper)
    max_history_frames:     512
    frame_wait_timeout_sec: 1.5    # slightly higher: real camera + network jitter
    frame_settle_sec:       0.3    # let the robot settle before sampling (real inertia)
    is_frame_rgb:           false  # native decoded frame is BGR → convert to RGB for the model